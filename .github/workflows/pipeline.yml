name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Stage 1: Lint ────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Lint Python (API)
        run: flake8 api/ --max-line-length=100

      - name: Lint Python (Worker)
        run: flake8 worker/ --max-line-length=100

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend deps
        run: cd frontend && npm install

      - name: Lint JavaScript
        run: cd frontend && npx eslint app.js

      - name: Lint Dockerfiles (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile

      - name: Lint worker Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: worker/Dockerfile

      - name: Lint frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile

  # ── Stage 2: Test ────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          pip install pytest pytest-cov pytest-mock
          pip install -r api/requirements.txt

      - name: Run API tests with coverage
        run: |
          cd api
          pytest tests/ -v --cov=. --cov-report=xml --cov-report=html

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/htmlcov/

  # ── Stage 3: Build ───────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            localhost:5000/api:${{ github.sha }}
            localhost:5000/api:latest

      - name: Build and push Worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            localhost:5000/worker:${{ github.sha }}
            localhost:5000/worker:latest

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            localhost:5000/frontend:${{ github.sha }}
            localhost:5000/frontend:latest

  # ── Stage 4: Security Scan ───────────────────────────────
  security:
    runs-on: ubuntu-latest
    needs: build
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - uses: actions/checkout@v4

      - name: Rebuild images for scanning
        run: |
          docker build -t localhost:5000/api:latest ./api
          docker build -t localhost:5000/worker:latest ./worker
          docker build -t localhost:5000/frontend:latest ./frontend

      - name: Scan API image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: localhost:5000/api:latest
          format: sarif
          output: trivy-api.sarif
          severity: CRITICAL
          exit-code: "1"

      - name: Scan Worker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: localhost:5000/worker:latest
          format: sarif
          output: trivy-worker.sarif
          severity: CRITICAL
          exit-code: "1"

      - name: Scan Frontend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: localhost:5000/frontend:latest
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL
          exit-code: "1"

      - name: Upload Trivy SARIF results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: "*.sarif"

  # ── Stage 5: Integration Test ────────────────────────────
  integration:
    runs-on: ubuntu-latest
    needs: security
    steps:
      - uses: actions/checkout@v4

      - name: Create .env file
        run: |
          cp .env.example .env

      - name: Start full stack
        run: docker compose up --build -d

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for services..."
          sleep 30
          docker compose ps

      - name: Submit a job and poll for completion
        run: |
          # Submit job through frontend
          JOB=$(curl -sf -X POST http://localhost:3000/jobs \
            -H "Content-Type: application/json" \
            -d '{"type": "test-job"}')
          echo "Submitted job: $JOB"
          JOB_ID=$(echo $JOB | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")

          # Poll until complete (max 60s)
          for i in $(seq 1 12); do
            STATUS=$(curl -sf http://localhost:3000/jobs/$JOB_ID | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")
            echo "Status: $STATUS"
            if [ "$STATUS" = "completed" ]; then
              echo "Job completed successfully!"
              exit 0
            fi
            sleep 5
          done
          echo "Job did not complete in time!"
          exit 1

      - name: Tear down stack
        if: always()
        run: docker compose down -v

  # ── Stage 6: Deploy ──────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/hngdevops/hng14-stage2-devops

            # Pull latest code
            git pull origin main

            # Rolling update — bring up new containers
            docker compose pull
            docker compose up -d --no-deps --build api
            docker compose up -d --no-deps --build worker
            docker compose up -d --no-deps --build frontend

            # Wait for health checks (60s max)
            echo "Checking health..."
            for i in $(seq 1 12); do
              STATUS=$(docker compose ps --format json | python3 -c "
            import sys, json
            services = [json.loads(l) for l in sys.stdin]
            unhealthy = [s['Name'] for s in services if s.get('Health') not in ['healthy', '']]
            print('unhealthy:' + ','.join(unhealthy) if unhealthy else 'healthy')
            ")
              echo "Health status: $STATUS"
              if [ "$STATUS" = "healthy" ]; then
                echo "All services healthy!"
                exit 0
              fi
              sleep 5
            done

            echo "Health check failed — rolling back!"
            git checkout HEAD~1
            docker compose up -d --build
            exit 1
